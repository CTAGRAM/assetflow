services:
  - type: web
    name: assetflow
    runtime: node
    plan: free
    buildCommand: cd client && npm ci && npm run build && cd ../server && npm ci
    startCommand: cd server && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: assetflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: assetflow-db
    plan: free
