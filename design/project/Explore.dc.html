<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<script src="data.js"></script>
<style>body{margin:0; background:#F4F3F0} a{color:#5F4DEE} a:hover{color:#4A39C9}</style>
</helmet>
<div style="min-height:100vh; background:#F4F3F0; position:relative; overflow:hidden; display:grid; place-items:center; padding:40px 20px; box-sizing:border-box; font-family:'Plus Jakarta Sans',system-ui,sans-serif; color:#2B2D33" data-screen-label="Explore Demo">
  <svg width="360" height="360" viewBox="0 0 200 200" style="position:absolute; top:-70px; left:-60px; opacity:0.5" fill="none" stroke="#DDE0F2" stroke-width="2" stroke-linecap="round"><path d="M100 180 C100 120 100 80 100 20"></path><path d="M100 150 C70 140 50 120 45 95M100 150 C130 140 150 120 155 95M100 115 C75 105 60 90 55 70M100 115 C125 105 140 90 145 70M100 80 C82 72 70 60 66 45M100 80 C118 72 130 60 134 45"></path></svg>
  <svg width="420" height="420" viewBox="0 0 200 200" style="position:absolute; bottom:-120px; right:-90px; opacity:0.55; transform:rotate(160deg)" fill="none" stroke="#DDE0F2" stroke-width="2" stroke-linecap="round"><path d="M100 180 C100 120 100 80 100 20"></path><path d="M100 150 C70 140 50 120 45 95M100 150 C130 140 150 120 155 95M100 115 C75 105 60 90 55 70M100 115 C125 105 140 90 145 70M100 80 C82 72 70 60 66 45M100 80 C118 72 130 60 134 45"></path></svg>

  <div style="width:min(960px, 100%); background:#fff; border-radius:10px; box-shadow:0 24px 70px rgba(43,45,51,0.13)">
    <div style="display:flex; align-items:center; padding:26px 38px 6px; flex-wrap:wrap; gap:12px">
      <a href="Login.dc.html" style="font-size:17px; font-weight:800; letter-spacing:0.5px; color:#2B2D33; text-decoration:none">assetflow<span style="color:#5F4DEE">.</span></a>
      <div style="margin-left:auto; display:flex; align-items:center; gap:26px">
        <span style="font-size:11px; font-weight:800; color:#5F4DEE; border-bottom:2px solid #5F4DEE; padding-bottom:2px">Explore demo</span>
        <a href="Contact.dc.html" style="font-size:11px; font-weight:600; color:#7A7E8C; text-decoration:none" style-hover="color:#2B2D33">Contact IT</a>
        <a href="Login.dc.html#login" style="font-size:11px; font-weight:600; color:#7A7E8C; text-decoration:none" style-hover="color:#2B2D33">Log in</a>
        <a href="Login.dc.html#signup" style="font-size:11px; font-weight:600; color:#7A7E8C; text-decoration:none" style-hover="color:#2B2D33">Sign up</a>
      </div>
    </div>

    <div style="padding:24px 38px 40px">
      <h1 style="margin:0 0 10px; font-size:26px; font-weight:600; letter-spacing:-0.4px">Take AssetFlow for a spin</h1>
      <p style="margin:0 0 26px; font-size:13px; font-weight:500; color:#8A8E9C; line-height:1.65; max-width:520px">One shared workspace, four very different jobs. Pick a persona below — every screen adapts its data, permissions, and approval powers to who you are.</p>

      <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:12px; margin-bottom:30px">
        <sc-for list="{{ personas }}" as="p" hint-placeholder-count="4">
          <button onClick="{{ p.enter }}" style="all:unset; box-sizing:border-box; cursor:pointer; border:1.5px solid #E7E7EE; border-radius:14px; padding:16px; display:flex; flex-direction:column; gap:10px; text-align:left" style-hover="border-color:#5F4DEE; box-shadow:0 8px 20px rgba(95,77,238,0.12)">
            <span style="display:flex; align-items:center; gap:9px">
              <span style="width:34px; height:34px; border-radius:99px; background:{{ p.avBg }}; color:{{ p.avInk }}; display:grid; place-items:center; font-size:11px; font-weight:800">{{ p.init }}</span>
              <span style="display:flex; flex-direction:column">
                <span style="font-size:12.5px; font-weight:800">{{ p.name }}</span>
                <span style="font-size:10px; font-weight:700; color:#5F4DEE">{{ p.role }}</span>
              </span>
            </span>
            <span style="font-size:11px; font-weight:500; color:#8A8E9C; line-height:1.55">{{ p.blurb }}</span>
            <span style="font-size:11px; font-weight:800; color:#5F4DEE">Enter as {{ p.first }} →</span>
          </button>
        </sc-for>
      </div>

      <div style="font-size:10px; font-weight:800; letter-spacing:0.6px; text-transform:uppercase; color:#AEB2C2; margin-bottom:10px">What's inside</div>
      <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(210px, 1fr)); gap:8px">
        <sc-for list="{{ tour }}" as="t" hint-placeholder-count="9">
          <a href="{{ t.href }}" style="display:flex; align-items:center; gap:9px; padding:10px 12px; border-radius:10px; background:#F7F7FA; text-decoration:none; color:#2B2D33" style-hover="background:#EEEBFE; color:#2B2D33">
            <span style="font-size:12px; font-weight:700; flex:1">{{ t.label }}</span>
            <span style="font-size:10px; font-weight:600; color:#8A8E9C">{{ t.note }}</span>
          </a>
        </sc-for>
      </div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const AF = window.AF; if (!AF) return { personas: [], tour: [] };
    const blurbs = {
      'Admin': 'Runs org setup, promotes roles, opens audit cycles, and sees everything across Northwind Labs.',
      'Asset Manager': 'Registers assets, approves allocations, transfers and maintenance, assigns technicians.',
      'Department Head': 'Sees and approves what touches their department, books resources on its behalf.',
      'Employee': 'Sees their own assets, books rooms and gear, raises maintenance and return requests.',
    };
    const personas = Object.keys(AF.personas).map(role => {
      const e = AF.emp(AF.personas[role]);
      return { role, name: e.name, first: e.name.split(' ')[0], init: AF.initials(e.name),
        avBg: AF.avatarBg(e.id), avInk: AF.avatarInk(e.id), blurb: blurbs[role],
        enter: () => { AF.setRole(role); location.href = 'Dashboard.dc.html'; } };
    });
    const tour = [
      { label: 'Dashboard', note: 'pending returns', href: 'Dashboard.dc.html' },
      { label: 'Asset Registry', note: '40 assets', href: 'Assets.dc.html' },
      { label: 'Allocation & Transfer', note: 'approvals', href: 'Allocation.dc.html' },
      { label: 'Resource Booking', note: 'week calendar', href: 'Booking.dc.html' },
      { label: 'Maintenance', note: '5-stage pipeline', href: 'Maintenance.dc.html' },
      { label: 'Audit Cycles', note: 'discrepancies', href: 'Audits.dc.html' },
      { label: 'Reports & Analytics', note: 'CSV exports', href: 'Reports.dc.html' },
      { label: 'Organization Setup', note: 'Admin only', href: 'Organization.dc.html' },
      { label: 'Notifications & Log', note: 'audit trail', href: 'Notifications.dc.html' },
    ];
    return { personas, tour };
  }
}

</script>
</body>
</html>
